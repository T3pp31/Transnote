name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0). Defaults to the pushed tag.'
        required: false
        type: string

permissions:
  contents: write

env:
  XCODE_VERSION: '16.4'
  SCHEME: LocalTranscriber
  PROJECT: LocalTranscriber.xcodeproj
  APP_NAME: Transnote
  DERIVED_DATA_PATH: DerivedData
  ARCHIVE_PATH: build/Transnote.xcarchive
  RELEASE_APP_DIR: build/release

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Verify required secrets
        run: |
          set -euo pipefail
          missing=()
          for var in APPLE_TEAM_ID APPLE_ID APPLE_APP_SPECIFIC_PASSWORD DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Secrets: ${missing[*]}" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ github.event.inputs.version }}"
            if [ -z "$raw" ]; then
              echo "workflow_dispatch requires the version input (e.g. v0.1.0)." >&2
              exit 1
            fi
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [ -z "$version" ]; then
            echo "Could not determine release version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          xcodebuild test \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
            -skip-testing:LocalTranscriberTests/ModelDownloadIntegrationTests \
            -skip-testing:LocalTranscriberTests/ModelAvailabilityPathTests/testWhisperKitLoadsFromDetectedModelFolder

      - name: Archive Release build
        run: |
          set -euo pipefail
          rm -rf "${{ env.ARCHIVE_PATH }}"
          xcodebuild archive \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}"

      - name: Import signing certificate
        id: signing
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -A -t priv -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Developer ID Application identity not found in imported certificate." >&2
            exit 1
          fi

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "signing_identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Export and sign app
        run: |
          set -euo pipefail
          rm -rf "${{ env.RELEASE_APP_DIR }}"
          ./scripts/export-release-app.sh \
            --archive "${{ env.ARCHIVE_PATH }}" \
            --output "${{ env.RELEASE_APP_DIR }}" \
            --sign "${{ steps.signing.outputs.signing_identity }}" \
            --team "${{ secrets.APPLE_TEAM_ID }}"

      - name: Notarize app
        run: |
          set -euo pipefail
          APP_PATH="${{ env.RELEASE_APP_DIR }}/${{ env.APP_NAME }}.app"
          ZIP_PATH="$RUNNER_TEMP/${{ env.APP_NAME }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          ./scripts/export-release-app.sh \
            --output "${{ env.RELEASE_APP_DIR }}" \
            --verify-only

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          ./scripts/create-dmg.sh \
            --app "${{ env.RELEASE_APP_DIR }}/${{ env.APP_NAME }}.app" \
            --version "${{ steps.version.outputs.version }}" \
            --output build/dist
          echo "dmg_path=build/dist/${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Transnote ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.dmg.outputs.dmg_path }}
