name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0). Defaults to the pushed tag.'
        required: false
        type: string

permissions:
  contents: write

env:
  XCODE_VERSION: '16.4'
  SCHEME: LocalTranscriber
  PROJECT: LocalTranscriber.xcodeproj
  APP_NAME: Transnote
  DERIVED_DATA_PATH: DerivedData
  ARCHIVE_PATH: build/Transnote.xcarchive
  RELEASE_APP_DIR: build/release

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ github.event.inputs.version }}"
            if [ -z "$raw" ]; then
              echo "workflow_dispatch requires the version input (e.g. v0.1.0)." >&2
              exit 1
            fi
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [ -z "$version" ]; then
            echo "Could not determine release version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Sync MARKETING_VERSION
        run: |
          chmod +x ./scripts/set-marketing-version.sh
          ./scripts/set-marketing-version.sh "${{ steps.version.outputs.version }}"

      - name: Run tests
        run: |
          xcodebuild test \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
            -skip-testing:LocalTranscriberTests/ModelDownloadIntegrationTests \
            -skip-testing:LocalTranscriberTests/ModelAvailabilityPathTests/testWhisperKitLoadsFromDetectedModelFolder

      - name: Archive Release build
        run: |
          set -euo pipefail
          rm -rf "${{ env.ARCHIVE_PATH }}"
          xcodebuild archive \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}"

      - name: Export app
        run: |
          set -euo pipefail
          rm -rf "${{ env.RELEASE_APP_DIR }}"
          ./scripts/export-release-app.sh \
            --archive "${{ env.ARCHIVE_PATH }}" \
            --output "${{ env.RELEASE_APP_DIR }}"

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          ./scripts/create-dmg.sh \
            --app "${{ env.RELEASE_APP_DIR }}/${{ env.APP_NAME }}.app" \
            --version "${{ steps.version.outputs.version }}" \
            --output build/dist
          versioned_dmg="build/dist/${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg"
          latest_dmg="build/dist/${{ env.APP_NAME }}.dmg"
          cp "$versioned_dmg" "$latest_dmg"
          echo "dmg_path=$versioned_dmg" >> "$GITHUB_OUTPUT"
          echo "latest_dmg_path=$latest_dmg" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Transnote ${{ steps.version.outputs.version }}
          body: |
            未署名ビルドです。DMG を開き、**インストール.command** を実行してインストールしてください（旧バージョンは自動的に置き換えられます）。

            初回起動時に Gatekeeper の警告が出る場合は、Finder でアプリを右クリックして「開く」を選んでください。

            詳細は [インストール手順](https://github.com/T3pp31/Transnote/blob/main/docs/install.md) を参照してください。
          generate_release_notes: true
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.latest_dmg_path }}
